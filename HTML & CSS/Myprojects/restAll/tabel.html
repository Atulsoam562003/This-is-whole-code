<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>

<body>
    <div>
        <table>
            <caption>Max Scores by different players</caption>
            <thead>
                <tr>
                    <!-- Html automatically bold the table headings -->
                    <th>S.no</th>
                    <th>Player name</th>
                    <!-- <th colspan="3">Max Score</th> to span over more no of headings -->
                    <th>Max Score</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Sachin Tandulkar</td>
                    <td>100</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Atul Soam</td>
                    <td>98</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Harry bahiya</td>
                    <td>99</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
