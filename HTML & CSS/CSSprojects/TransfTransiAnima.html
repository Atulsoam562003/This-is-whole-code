<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="TransfTransiAnimas.css">
    <title>TTA</title>
</head>

<body>
    <div class="container">
        <div class="box"><img id="myImage" src="https://images.unsplash.com/photo-1560707303-4e980ce876ad?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MXx8c291cmNlfGVufDB8fDB8fA%3D%3D&auto=format&fit=crop&w=500&q=60">
            <button id="btn">Toggle</button>
        </div>
    </div>
</body>
<script>
    // explicitly apply the width property again
    myImage.style.width = '146px';
    myImage.style.height = '16px';
    btn.addEventListener("click", () => {
        myImage.style.height = '446px';
        if (myImage.style.width === '546px') {
            myImage.style.width = "146px";
        } else if (myImage.style.width === '146px') {
            myImage.style.width = "546px";
        }
    })
</script>

</html>
